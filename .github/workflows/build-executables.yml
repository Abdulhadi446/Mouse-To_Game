name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements.txt

      - name: Build mouse-to-game (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --collect-all pynput --collect-all Xlib --collect-all evdev --name mouse-to-game mouse_to_wasd.py

      - name: Build input-remapper-runner (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --collect-all pynput --collect-all Xlib --collect-all evdev --name input-remapper-runner input_remapper_runner.py

      - name: Build mouse-to-game (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --collect-all pynput --name mouse-to-game mouse_to_wasd.py

      - name: Build input-remapper-runner (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --collect-all pynput --name input-remapper-runner input_remapper_runner.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ runner.os }}
          path: dist/**

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: executables-*
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/executables-Linux/*
            release-assets/executables-Windows/*
