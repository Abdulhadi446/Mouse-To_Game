name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build mouse-to-game (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name mouse-to-game mouse_to_wasd.py

      - name: Build input-remapper-runner (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name input-remapper-runner input_remapper_runner.py

      - name: Build mouse-to-game (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          py -3 -m PyInstaller --noconfirm --clean --onefile --windowed --name mouse-to-game.exe mouse_to_wasd.py

      - name: Build input-remapper-runner (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          py -3 -m PyInstaller --noconfirm --clean --onefile --name input-remapper-runner.exe input_remapper_runner.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ runner.os }}
          path: dist/*
